<!DOCTYPE html><html><head>
  <!--

    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="OnlyScents Parfums - L'essence de l'élégance">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OnlyScents">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>OnlyScents</title>
  <link rel="manifest" href="manifest.json">
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <!-- Écran de chargement web brandé, affiché UNIQUEMENT pendant le
       téléchargement/démarrage du moteur Flutter, puis retiré en fondu au
       premier frame (événement standard 'flutter-first-frame'). Le splash
       Dart animé (SplashView) n'est plus joué sur le web — voir main.dart.
       NB : si vous relancez `dart run flutter_native_splash:create`, il
       écrasera ces blocs — reprendre ce fichier depuis git dans ce cas. -->
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #1A1A1A;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #1A1A1A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity .45s ease;
      pointer-events: none;
    }

    #splash .monogram {
      width: 88px;
      height: 88px;
      border: 1.4px solid #C9A96E;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 44px;
      color: #C9A96E;
    }

    #splash .name {
      margin-top: 26px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 26px;
      letter-spacing: 8px;
      text-indent: 8px; /* compense le letter-spacing du dernier caractère */
      color: #FFFFFF;
    }

    #splash .line {
      margin-top: 18px;
      width: 120px;
      height: 1px;
      background: rgba(201, 169, 110, .25);
      position: relative;
      overflow: hidden;
    }

    #splash .line::after {
      content: '';
      position: absolute;
      top: 0;
      left: -40%;
      width: 40%;
      height: 100%;
      background: #C9A96E;
      animation: splash-slide 1.2s ease-in-out infinite;
    }

    @keyframes splash-slide {
      from { left: -40%; }
      to   { left: 100%; }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      const splash = document.getElementById("splash");
      if (splash) {
        splash.style.opacity = "0";
        setTimeout(() => splash.remove(), 500);
      }
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
    window.addEventListener("flutter-first-frame", removeSplashFromWeb);
  </script>
</head>
<body>
  <div id="splash">
    <div class="monogram">S</div>
    <div class="name">ONLYSCENTS</div>
    <div class="line"></div>
  </div>

  <script src="flutter_bootstrap.js" async=""></script>


</body></html>
